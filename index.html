<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock Map Widget</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .widget-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            aspect-ratio: 2 / 1;
            background-color: #000;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .info-overlay {
            position: absolute;
            bottom: 25px;
            left: 30px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
        }

        .location-name {
            color: #ff9f0a; /* 강조용 주황색 */
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: -5px;
        }

        .local-time {
            font-size: 4.5rem;
            font-weight: 500;
            letter-spacing: -2px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <canvas id="map-canvas"></canvas>
        
        <div class="info-overlay">
            <div class="location-name" id="loc-name">SEOUL</div>
            <div class="local-time" id="loc-time">00:00</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d', { alpha: false });
        
        // 캔버스 내부 해상도 설정 (비율 2:1)
        const width = 900;
        const height = 450;
        canvas.width = width;
        canvas.height = height;

        // D3 지도 투영법 설정
        const projection = d3.geoEquirectangular().translate([width / 2, height / 2]).scale(140);
        const path = d3.geoPath().projection(projection).context(ctx);

        let dots = [];
        let targetCity = { name: 'SEOUL', lon: 126.9780, lat: 37.5665 }; // 기본값

        // 1. URL Parameter 파싱 및 Geocoding API 호출
        function fetchLocation() {
            const urlParams = new URLSearchParams(window.location.search);
            const queryLoc = urlParams.get('location');
            
            if (queryLoc) {
                document.getElementById('loc-name').innerText = decodeURIComponent(queryLoc).toUpperCase();
                
                // Nominatim API를 통한 좌표 검색
                fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(queryLoc)}&format=json&limit=1`, {
                    headers: { 'Accept-Language': 'ko-KR,ko;q=0.9,en-US;q=0.8,en;q=0.7' }
                })
                .then(res => res.json())
                .then(data => {
                    if (data && data.length > 0) {
                        targetCity.lon = parseFloat(data[0].lon);
                        targetCity.lat = parseFloat(data[0].lat);
                        targetCity.name = decodeURIComponent(queryLoc).toUpperCase();
                    }
                })
                .catch(err => console.error("위치 정보를 가져오는데 실패했습니다.", err));
            } else {
                document.getElementById('loc-name').innerText = targetCity.name;
            }
        }

        // 2. 세계 지도 데이터를 불러와서 점(Dot) 배열로 변환
        function initMap() {
            // TopoJSON 데이터 로드 (국가 형태 맵)
            d3.json('https://unpkg.com/world-atlas@2.0.2/countries-110m.json').then(world => {
                const geojsonData = topojson.feature(world, world.objects.countries);

                // 화면에 보이지 않는 임시 캔버스에 지도를 그려서 육지 영역 픽셀을 추출
                const hiddenCanvas = document.createElement('canvas');
                hiddenCanvas.width = width;
                hiddenCanvas.height = height;
                const hCtx = hiddenCanvas.getContext('2d', { willReadFrequently: true });
                
                const hiddenPath = d3.geoPath().projection(projection).context(hCtx);
                hCtx.fillStyle = 'white';
                hCtx.beginPath();
                hiddenPath(geojsonData);
                hCtx.fill();

                const imgData = hCtx.getImageData(0, 0, width, height).data;
                const dotSpacing = 7; // 점 간격
                const dotRadius = 1.5; // 점 크기

                // 일정한 간격으로 픽셀을 스캔하며 육지(흰색)인 곳에 점 좌표 기록
                for (let y = 0; y < height; y += dotSpacing) {
                    for (let x = 0; x < width; x += dotSpacing) {
                        const index = (y * width + x) * 4;
                        if (imgData[index + 3] > 128) { 
                            const lonLat = projection.invert([x, y]);
                            if (lonLat) {
                                dots.push({ 
                                    x: x + dotSpacing / 2, 
                                    y: y + dotSpacing / 2, 
                                    lon: lonLat[0], 
                                    lat: lonLat[1] 
                                });
                            }
                        }
                    }
                }
                
                // 렌더링 루프 시작
                requestAnimationFrame(draw);
            });
        }

        // 3. 태양의 적위 및 직하점(Subsolar Point) 계산
        function getSolarPosition(date) {
            const start = new Date(date.getUTCFullYear(), 0, 0);
            const diff = date - start;
            const dayOfYear = Math.floor(diff / (1000 * 60 * 60 * 24));

            // 태양 적위 근사치 계산 (-23.44도 ~ 23.44도)
            const decDeg = -23.44 * Math.cos((360 / 365) * (dayOfYear + 10) * (Math.PI / 180));
            const decRad = decDeg * (Math.PI / 180);

            // UTC 기반 직하점 경도 계산
            const utcHours = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
            const subsolarLon = 180 - (utcHours * 15);

            return { decRad, subsolarLon };
        }

        // 특정 좌표가 주간인지 야간인지 고도 계산으로 판별
        function isDaylight(lon, lat, decRad, subsolarLon) {
            const latRad = lat * (Math.PI / 180);
            let hourAngleDeg = (lon - subsolarLon % 360 + 540) % 360 - 180;
            const hourAngleRad = hourAngleDeg * (Math.PI / 180);

            const sinH = Math.sin(latRad) * Math.sin(decRad) +
                         Math.cos(latRad) * Math.cos(decRad) * Math.cos(hourAngleRad);
            return sinH > 0;
        }

        // 4. 메인 렌더링 루프
        let lastMinute = -1;
        function draw() {
            const now = new Date();
            
            // 시간 표시 업데이트 (분이 바뀔 때만)
            if (now.getMinutes() !== lastMinute) {
                document.getElementById('loc-time').innerText = 
                    now.getHours().toString().padStart(2, '0') + ':' + 
                    now.getMinutes().toString().padStart(2, '0');
                lastMinute = now.getMinutes();
            }

            const { decRad, subsolarLon } = getSolarPosition(now);

            // 화면 초기화
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            // 1) 점 그리기
            ctx.beginPath();
            dots.forEach(dot => {
                const isDay = isDaylight(dot.lon, dot.lat, decRad, subsolarLon);
                ctx.fillStyle = isDay ? '#ffffff' : '#3a3a3c'; // 주간은 흰색, 야간은 짙은 회색
                ctx.moveTo(dot.x, dot.y);
                ctx.arc(dot.x, dot.y, 1.2, 0, Math.PI * 2);
            });
            ctx.fill();

            // 2) 경계선(Terminator Line) 그리기
            // 수학적으로 고도가 0이 되는 위도(lat)를 각 경도(lon)마다 계산하여 LineString 생성
            let safeDecRad = decRad;
            if (Math.abs(safeDecRad) < 0.0001) safeDecRad = safeDecRad < 0 ? -0.0001 : 0.0001; // 분모 0 방지

            const terminatorCoords = [];
            for (let lon = -180; lon <= 180; lon += 2) {
                let hourAngleDeg = (lon - subsolarLon % 360 + 540) % 360 - 180;
                const hourAngleRad = hourAngleDeg * (Math.PI / 180);
                
                // tan(lat) = -cos(hourAngle) / tan(declination)
                const latRad = Math.atan(-Math.cos(hourAngleRad) / Math.tan(safeDecRad));
                terminatorCoords.push([lon, latRad * (180 / Math.PI)]);
            }

            ctx.beginPath();
            const lineFeature = { type: "LineString", coordinates: terminatorCoords };
            path(lineFeature);
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.45)'; // 부드러운 반투명 흰색 라인
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // 3) 타겟 도시 강조 (주황색 점)
            const projectedPoint = projection([targetCity.lon, targetCity.lat]);
            if (projectedPoint && projectedPoint[0]) {
                const [cx, cy] = projectedPoint;
                
                ctx.fillStyle = '#ff9f0a';
                ctx.beginPath();
                ctx.arc(cx, cy, 4, 0, Math.PI * 2);
                ctx.fill();
                
                // 네온 글로우 효과
                ctx.shadowColor = '#ff9f0a';
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.shadowBlur = 0; // 글로우 리셋
            }

            // 루프 반복
            requestAnimationFrame(draw);
        }

        // 실행
        fetchLocation();
        initMap();

    </script>
</body>
</html>
