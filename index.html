<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Watch World Clock - Focused View</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .widget-container {
            position: relative;
            width: 100%;
            max-width: 1200px;
            aspect-ratio: 2.5 / 1; /* 가로로 더 긴 비율로 조정 */
            background-color: #000;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        /* 왼쪽 텍스트 영역 */
        .info-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 50%; /* 화면의 절반 차지 */
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding-left: 60px;
            pointer-events: none;
            z-index: 10;
        }

        .location-name {
            color: #ff9f0a;
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .local-time {
            font-size: 8rem; /* 더 크게 강조 */
            font-weight: 600;
            letter-spacing: -4px;
            margin: 0;
            line-height: 1;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <canvas id="map-canvas"></canvas>
        
        <div class="info-overlay">
            <div class="location-name" id="loc-name">SEOUL</div>
            <div class="local-time" id="loc-time">00:00</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');
        
        // 캔버스 해상도 설정
        const width = 1200;
        const height = 480;
        canvas.width = width;
        canvas.height = height;

        // 지도를 오른쪽으로 밀기 위한 투영 설정
        // rotate: [경도, 위도, 롤] -> 입력된 경도의 반대 방향으로 회전시켜 중심에 오게 함
        let projection = d3.geoEquirectangular()
            .translate([width * 0.75, height / 2]) // 지도의 중심축을 전체 화면의 75% 지점(오른쪽 중심)으로 이동
            .scale(220)
            .rotate([-126.9780, 0]); // 초기값 서울 중심

        const path = d3.geoPath().projection(projection).context(ctx);

        let targetCity = { name: 'SEOUL', lon: 126.9780, lat: 37.5665 };
        let currentTimezone = 'Asia/Seoul';
        let worldData = null;

        // 1. 태양 위치 계산
        function getSunPosition(date) {
            const start = new Date(date.getUTCFullYear(), 0, 0);
            const diff = date - start;
            const dayOfYear = Math.floor(diff / 86400000);
            const decDeg = -23.44 * Math.cos((360 / 365) * (dayOfYear + 10) * (Math.PI / 180));
            const utcHours = date.getUTCHours() + date.getUTCMinutes() / 60;
            let subsolarLon = 180 - (utcHours * 15);
            if (subsolarLon > 180) subsolarLon -= 360;
            return { lon: subsolarLon, lat: decDeg };
        }

        // 2. 동적 점 생성 (회전 반영)
        function draw() {
            if (!worldData) return;

            const now = new Date();
            const sunPos = getSunPosition(now);
            const decRad = sunPos.lat * Math.PI / 180;
            const subLonRad = sunPos.lon * Math.PI / 180;

            ctx.clearRect(0, 0, width, height);

            // 육지 영역에 대해서만 점 그리기
            const landDots = [];
            // 성능과 밀도를 위해 2.8도 간격으로 스캔
            for(let lon = -180; lon <= 180; lon += 2.8) {
                for(let lat = -80; lat <= 80; lat += 2.8) {
                    if (d3.geoContains(worldData, [lon, lat])) {
                        const p = projection([lon, lat]);
                        // 화면 범위 내에 있는 점만 계산
                        if (p && p[0] > width * 0.4) { 
                            const latRad = lat * Math.PI / 180;
                            const lonRad = lon * Math.PI / 180;
                            const altitudeSin = Math.sin(latRad) * Math.sin(decRad) + 
                                               Math.cos(latRad) * Math.cos(decRad) * Math.cos(lonRad - subLonRad);
                            
                            ctx.fillStyle = altitudeSin > 0 ? '#ffffff' : '#3a3a3c';
                            ctx.beginPath();
                            ctx.arc(p[0], p[1], 1.5, 0, Math.PI * 2);
                            ctx.fill();
                        }
                    }
                }
            }

            // 주야간 경계선
            const terminator = d3.geoCircle().center([sunPos.lon, sunPos.lat]).radius(90)();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            path(terminator);
            ctx.stroke();

            // 대상 지역 오렌지 점
            const targetP = projection([targetCity.lon, targetCity.lat]);
            if (targetP) {
                ctx.fillStyle = '#ff9f0a';
                ctx.shadowColor = '#ff9f0a';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(targetP[0], targetP[1], 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(draw);
        }

        // 3. 지역 정보 로드 및 지도 회전 업데이트
        async function updateLocation() {
            const urlParams = new URLSearchParams(window.location.search);
            const query = urlParams.get('location') || 'Seoul';

            try {
                const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=1`);
                const data = await res.json();
                
                if (data && data[0]) {
                    targetCity.lon = parseFloat(data[0].lon);
                    targetCity.lat = parseFloat(data[0].lat);
                    targetCity.name = query.toUpperCase();
                    document.getElementById('loc-name').innerText = targetCity.name;

                    // 핵심: 지도의 중심을 해당 지역 경도로 회전
                    projection.rotate([-targetCity.lon, 0]);

                    const tzRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${targetCity.lat}&longitude=${targetCity.lon}&current_weather=true&timezone=auto`);
                    const tzData = await tzRes.json();
                    currentTimezone = tzData.timezone || 'UTC';
                }
            } catch (e) {
                console.error("Location error", e);
            }
        }

        function updateClock() {
            const now = new Date();
            const timeString = new Intl.DateTimeFormat('en-GB', {
                timeZone: currentTimezone,
                hour: '2-digit',
                minute: '2-digit',
                hour12: false
            }).format(now);
            document.getElementById('loc-time').innerText = timeString;
        }

        // 초기화
        d3.json('https://unpkg.com/world-atlas@2.0.2/countries-110m.json').then(data => {
            worldData = topojson.feature(data, data.objects.land);
            updateLocation().then(() => {
                setInterval(updateClock, 1000);
                updateClock();
                requestAnimationFrame(draw);
            });
        });
    </script>
</body>
</html>
