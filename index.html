<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEMO Watch World Clock</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .widget-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 2.2 / 1;
            background-color: #000;
            border-radius: 20px;
            overflow: hidden;
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .info-overlay {
            position: absolute;
            bottom: 30px;
            left: 40px;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            text-shadow: 0 2px 10px rgba(0,0,0,0.8);
        }

        .location-name {
            color: #00F918;
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 2px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .weather-info {
            font-size: 1.1rem;
            color: #00F9E0;
            font-weight: 500;
            white-space: nowrap;
        }

        .local-time {
            font-size: 5.5rem;
            font-weight: 600;
            letter-spacing: -2px;
            margin: 0;
            line-height: 1.1;
            transition: opacity 0.4s ease-in-out;
        }
    </style>
</head>
<body>

    <div class="widget-container">
        <canvas id="map-canvas"></canvas>
        
        <div class="info-overlay" id="info-overlay">
            <div class="location-name" id="loc-name">SEOUL <span class="weather-info" id="weather-info">⛅ --°C</span></div>
            <div class="local-time" id="loc-time">--:--</div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');
        
        const width = 1000;
        const height = 454;
        canvas.width = width;
        canvas.height = height;

        let targetCity = { name: 'SEOUL', lon: 126.9780, lat: 37.5665 };
        let currentTimezone = 'Asia/Seoul';
        let landDots = [];

        let timeSpeed = 1;
        let simulationStartTime = Date.now();
        let realStartTime = Date.now();

        let isNemoMode = false;
        let nemoScale = 220;

        const projectionBase = d3.geoEquirectangular();
        let projection = projectionBase.translate([width / 2, height / 2]).scale(160);
        let path = d3.geoPath().projection(projection).context(ctx);

        function getSimulationTime() {
            if (timeSpeed === 1) return new Date();
            const elapsedReal = (Date.now() - realStartTime) / 1000;
            const simulatedMs = elapsedReal * timeSpeed * 1000;
            return new Date(simulationStartTime + simulatedMs);
        }

        function getSunPosition(date) {
            const start = new Date(date.getUTCFullYear(), 0, 0);
            const diff = date - start;
            const dayOfYear = Math.floor(diff / 86400000);
            const decDeg = -23.44 * Math.cos((360 / 365) * (dayOfYear + 10) * (Math.PI / 180));
            
            const utcHours = date.getUTCHours() + date.getUTCMinutes() / 60 + date.getUTCSeconds() / 3600;
            let subsolarLon = 180 - (utcHours * 15);
            if (subsolarLon > 180) subsolarLon -= 360;
            if (subsolarLon < -180) subsolarLon += 360;

            return { lon: subsolarLon, lat: decDeg };
        }

        function initMap() {
            d3.json('https://unpkg.com/world-atlas@2.0.2/countries-110m.json').then(world => {
                const landFeature = topojson.feature(world, world.objects.land);
                landDots = [];
                for(let lon = -180; lon <= 180; lon += 2.5) {
                    for(let lat = -85; lat <= 85; lat += 2.5) {
                        if (d3.geoContains(landFeature, [lon, lat])) {
                            const projected = projection([lon, lat]);
                            if (projected) {
                                landDots.push({ lon, lat, latRad: lat * Math.PI / 180, x: projected[0], y: projected[1] });
                            }
                        }
                    }
                }
                requestAnimationFrame(draw);
            }).catch(err => console.error("맵 데이터 로드 실패", err));
        }

        function draw() {
            const now = getSimulationTime();
            const sunPos = getSunPosition(now);
            const decRad = sunPos.lat * Math.PI / 180;
            const subLonRad = sunPos.lon * Math.PI / 180;
            const sinDec = Math.sin(decRad);
            const cosDec = Math.cos(decRad);

            ctx.clearRect(0, 0, width, height);

            landDots.forEach(dot => {
                const lonRad = dot.lon * Math.PI / 180;
                const H = lonRad - subLonRad;
                const altitudeSin = Math.sin(dot.latRad) * sinDec + Math.cos(dot.latRad) * cosDec * Math.cos(H);
                const isDay = altitudeSin > 0;
                ctx.fillStyle = isDay ? '#ffffff' : '#3a3a3c';
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, 1.5, 0, Math.PI * 2);
                ctx.fill();
            });

            const terminatorCircle = d3.geoCircle().center([sunPos.lon, sunPos.lat]).radius(90)();
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            path(terminatorCircle);
            ctx.stroke();

            const projectedPoint = projection([targetCity.lon, targetCity.lat]);
            if (projectedPoint) {
                ctx.fillStyle = '#00F918';
                ctx.shadowColor = '#00F918';
                ctx.shadowBlur = 15;
                ctx.beginPath();
                ctx.arc(projectedPoint[0], projectedPoint[1], 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
            }

            requestAnimationFrame(draw);
        }

        // 부드러운 시간 업데이트 (HH:MM)
        let lastDisplayedTime = '';
        function updateClock() {
            const now = getSimulationTime();
            const options = { timeZone: currentTimezone, hour: '2-digit', minute: '2-digit', hour12: false };
            let timeString;
            try {
                timeString = new Intl.DateTimeFormat('en-GB', options).format(now);
            } catch(e) {
                const h = now.getHours().toString().padStart(2, '0');
                const m = now.getMinutes().toString().padStart(2, '0');
                timeString = `${h}:${m}`;
            }

            if (timeString !== lastDisplayedTime) {
                const timeEl = document.getElementById('loc-time');
                timeEl.style.opacity = '0';
                setTimeout(() => {
                    timeEl.innerText = timeString;
                    timeEl.style.opacity = '1';
                }, 200);
                lastDisplayedTime = timeString;
            }
        }

        // wttr.in으로 날씨 가져오기 (간단하고 예쁜 형식)
        async function updateWeather() {
            const weatherEl = document.getElementById('weather-info');
            const city = targetCity.name.toLowerCase().replace(/ /g, '+');

            try {
                // format=1 : 이모지 + 온도 (가장 깔끔함)
                const res = await fetch(`https://wttr.in/${city}?format=1&lang=ko`);
                const text = await res.text();
                weatherEl.innerText = text.trim();
            } catch (err) {
                console.error("날씨 정보를 가져오지 못했습니다.", err);
                weatherEl.innerText = "⛅ --°C";
            }
        }

        // URL 파라미터 처리
        async function setupLocation() {
            const urlParams = new URLSearchParams(window.location.search);
            const queryLoc = urlParams.get('location');
            const isDev = urlParams.has('DEV') || urlParams.has('dev');
            const isNoTime = urlParams.has('notime') || urlParams.has('noTime');
            const isNemo = urlParams.has('NEMO') || urlParams.has('nemo');

            if (isDev) {
                timeSpeed = 288;
                console.log('%c🚀 DEV 모드 활성화: 24시간 = 5분 빠른 시뮬레이션', 'color:#00F918; font-weight:bold');
            }

            if (isNoTime) {
                document.getElementById('loc-time').style.display = 'none';
                console.log('%c⏰ 시간 표시 OFF (날씨는 유지)', 'color:#888');
            }

            if (isNemo) {
                isNemoMode = true;
                nemoScale = 220;
                console.log('%c🌍 NEMO 모드: 도시 중앙 정렬', 'color:#00F918; font-weight:bold');
            }

            if (queryLoc) {
                targetCity.name = decodeURIComponent(queryLoc.split('?')[0]).toUpperCase();
                document.getElementById('loc-name').childNodes[0].nodeValue = targetCity.name + " "; // 도시 이름 업데이트
            } else {
                document.getElementById('loc-name').childNodes[0].nodeValue = targetCity.name + " ";
            }

            // 위치 기반 타임존 및 좌표 업데이트
            if (queryLoc) {
                try {
                    const geoRes = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(queryLoc)}&format=json&limit=1`);
                    const geoData = await geoRes.json();
                    if (geoData && geoData.length > 0) {
                        targetCity.lon = parseFloat(geoData[0].lon);
                        targetCity.lat = parseFloat(geoData[0].lat);

                        const tzRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${targetCity.lat}&longitude=${targetCity.lon}&current_weather=true&timezone=auto`);
                        const tzData = await tzRes.json();
                        if (tzData.timezone) currentTimezone = tzData.timezone;
                    }
                } catch (err) {
                    console.error("위치 정보를 불러오는 데 실패했습니다.", err);
                }
            }

            if (isNemoMode) {
                projection = projectionBase.translate([width/2, height/2]).scale(nemoScale).center([targetCity.lon, targetCity.lat]);
                path = d3.geoPath().projection(projection).context(ctx);
            }

            // 초기 실행
            updateClock();
            updateWeather();

            // 주기적 업데이트
            setInterval(updateClock, 100);
            setInterval(updateWeather, 600000); // 10분마다 날씨 갱신
        }

        // 실행
        setupLocation().then(initMap);
    </script>
</body>
</html>
