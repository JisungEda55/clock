<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock - Sun Position</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
        }

        .info {
            position: absolute;
            left: 40px;
            bottom: 40px;
            z-index: 10;
        }

        .city {
            color: #ff9500;
            font-size: 18px;
            margin-bottom: 5px;
            font-weight: 700;
        }

        .time {
            font-size: 72px;
            font-weight: 700;
            line-height: 1;
            letter-spacing: -2px;
        }

        .utc {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 18px;
            color: #aaa;
            z-index: 10;
        }

        .title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            color: #666;
            z-index: 10;
            letter-spacing: 4px;
        }
    </style>
</head>
<body>
    <div class="title">WORLD SUN CLOCK</div>
    <div class="utc" id="utc">UTC 18:04</div>
    
    <canvas id="canvas" width="1200" height="600"></canvas>

    <div class="info">
        <div class="city" id="cityName">서울</div>
        <div class="time" id="localTime">18:04</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        let width = 1200;
        let height = 600;
        let dots = [];
        let sunLine = [];
        
        // 주요 도시 좌표 (경도, 위도) - 실제 지도에 맞게 조정
        const cities = {
            'SEOUL': { lon: 126.978, lat: 37.566, name: '서울', ko: '서울' },
            'TOKYO': { lon: 139.650, lat: 35.676, name: 'Tokyo', ko: '도쿄' },
            'NEWYORK': { lon: -74.006, lat: 40.712, name: 'New York', ko: '뉴욕' },
            'LONDON': { lon: -0.127, lat: 51.507, name: 'London', ko: '런던' },
            'PARIS': { lon: 2.352, lat: 48.856, name: 'Paris', ko: '파리' },
            'SYDNEY': { lon: 151.209, lat: -33.868, name: 'Sydney', ko: '시드니' },
            'LOSANGELES': { lon: -118.243, lat: 34.052, name: 'Los Angeles', ko: '로스앤젤레스' },
            'MOSCOW': { lon: 37.617, lat: 55.755, name: 'Moscow', ko: '모스크바' },
            'BEIJING': { lon: 116.407, lat: 39.904, name: 'Beijing', ko: '베이징' },
            'DUBAI': { lon: 55.270, lat: 25.204, name: 'Dubai', ko: '두바이' }
        };

        // 점 생성 (세계지도 형태)
        function generateDots() {
            dots = [];
            const dotDensity = 1.8; // 점 밀도
            
            // 경도 -180 ~ 180, 위도 -90 ~ 90
            for (let lon = -180; lon <= 180; lon += 3.5) {
                for (let lat = -85; lat <= 85; lat += 3.5) {
                    // 실제 대륙 모양을 근사적으로 표현 (간단한 필터)
                    if (Math.random() > 0.35) continue; // 랜덤하게 점 생성
                    
                    // 바다/육지 근사 (간단한 조건)
                    let isLand = true;
                    if (lat < -60 || lat > 75) isLand = false; // 극지방
                    
                    // 간단한 대륙 필터
                    if (lon > -30 && lon < 50 && lat > 10 && lat < 70) isLand = true; // 유럽/아프리카/아시아
                    if (lon > -130 && lon < -60 && lat > 10 && lat < 60) isLand = true; // 북미
                    if (lon > -80 && lon < -30 && lat > -60 && lat < 15) isLand = true; // 남미
                    
                    if (!isLand && Math.random() > 0.6) continue;
                    
                    const x = (lon + 180) / 360 * width;
                    const y = (90 - lat) / 180 * height;
                    
                    dots.push({
                        x: x,
                        y: y,
                        lon: lon,
                        lat: lat,
                        baseAlpha: Math.random() * 0.4 + 0.6
                    });
                }
            }
        }

        // 태양 위치 계산 (현재 시간 기준)
        function getSunPosition() {
            const now = new Date();
            const utcHours = now.getUTCHours() + now.getUTCMinutes()/60 + now.getUTCSeconds()/3600;
            
            // 태양 직하점 경도 (지구 자전 기준)
            // 15도/시간, 자정(0시)에 180도 (태평양 중앙)
            const solarLongitude = (180 - (utcHours * 15)) % 360;
            if (solarLongitude < -180) solarLongitude += 360;
            
            return {
                lon: solarLongitude,
                utcHours: utcHours
            };
        }

        // 점이 낮(태양이 떠있는지) 판단
        function isDaytime(dot, sunLon) {
            let diff = dot.lon - sunLon;
            if (diff > 180) diff -= 360;
            if (diff < -180) diff += 360;
            
            // ±90도 이내 = 낮 (태양이 떠 있음)
            return Math.abs(diff) <= 90;
        }

        // 태양 경계선 계산
        function calculateSunLine(sunLon) {
            sunLine = [];
            const steps = 180;
            
            for (let i = 0; i <= steps; i++) {
                const t = i / steps;
                const lat = 90 - t * 180; // 위도 -90 ~ 90
                
                // 경계선 경도 계산 (대략적인 terminator line)
                const terminatorLon = (sunLon + (lat > 0 ? 10 : -5) * Math.sin(t * Math.PI)) % 360;
                
                const x = (terminatorLon + 180) / 360 * width;
                const y = (90 - lat) / 180 * height;
                
                sunLine.push({x, y});
            }
        }

        // 도시 강조 점 찾기
        function findHighlightDot(location) {
            if (!location || !cities[location]) return null;
            
            const city = cities[location];
            let closest = null;
            let minDist = Infinity;
            
            dots.forEach(dot => {
                const dist = Math.hypot(dot.lon - city.lon, dot.lat - city.lat);
                if (dist < minDist) {
                    minDist = dist;
                    closest = dot;
                }
            });
            
            return closest;
        }

        // 그리기
        function draw() {
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);
            
            const sunInfo = getSunPosition();
            const sunLon = sunInfo.lon;
            
            calculateSunLine(sunLon);
            
            // 점 그리기
            ctx.shadowBlur = 0;
            
            dots.forEach(dot => {
                const isDay = isDaytime(dot, sunLon);
                
                if (isDay) {
                    ctx.fillStyle = `rgba(255, 255, 255, ${dot.baseAlpha})`;
                } else {
                    ctx.fillStyle = `rgba(120, 120, 140, ${dot.baseAlpha * 0.75})`;
                }
                
                ctx.beginPath();
                ctx.arc(dot.x, dot.y, 1.8, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // 태양 경계선 (부드러운 그라데이션 선)
            if (sunLine.length > 1) {
                ctx.strokeStyle = 'rgba(255, 220, 100, 0.9)';
                ctx.lineWidth = 4.5;
                ctx.shadowColor = '#ffeb3b';
                ctx.shadowBlur = 25;
                
                ctx.beginPath();
                ctx.moveTo(sunLine[0].x, sunLine[0].y);
                
                for (let i = 1; i < sunLine.length; i++) {
                    ctx.lineTo(sunLine[i].x, sunLine[i].y);
                }
                ctx.stroke();
                
                // 추가로 부드러운 빛 효과
                ctx.shadowBlur = 40;
                ctx.lineWidth = 8;
                ctx.strokeStyle = 'rgba(255, 240, 180, 0.25)';
                ctx.beginPath();
                ctx.moveTo(sunLine[0].x, sunLine[0].y);
                for (let i = 1; i < sunLine.length; i++) {
                    ctx.lineTo(sunLine[i].x, sunLine[i].y);
                }
                ctx.stroke();
            }
            
            // 도시 강조
            const urlParams = new URLSearchParams(window.location.search);
            let location = urlParams.get('location') ? urlParams.get('location').toUpperCase() : 'SEOUL';
            
            const highlightDot = findHighlightDot(location);
            const cityInfo = cities[location] || cities['SEOUL'];
            
            if (highlightDot) {
                // 주황색 강조 점
                ctx.shadowBlur = 30;
                ctx.shadowColor = '#ff9500';
                ctx.fillStyle = '#ff9500';
                ctx.beginPath();
                ctx.arc(highlightDot.x, highlightDot.y, 7, 0, Math.PI * 2);
                ctx.fill();
                
                // 외곽 빛
                ctx.shadowBlur = 60;
                ctx.fillStyle = 'rgba(255, 149, 0, 0.35)';
                ctx.beginPath();
                ctx.arc(highlightDot.x, highlightDot.y, 14, 0, Math.PI * 2);
                ctx.fill();
            }
            
            // UI 업데이트
            updateUI(cityInfo, sunInfo);
        }

        function updateUI(cityInfo, sunInfo) {
            // 현재 시간 (UTC)
            const now = new Date();
            const utcHours = String(now.getUTCHours()).padStart(2, '0');
            const utcMinutes = String(now.getUTCMinutes()).padStart(2, '0');
            document.getElementById('utc').textContent = `UTC ${utcHours}:${utcMinutes}`;
            
            // 선택된 도시 시간
            const cityNameEl = document.getElementById('cityName');
            const timeEl = document.getElementById('localTime');
            
            cityNameEl.textContent = cityInfo.ko || cityInfo.name;
            
            // 도시별 현지 시간 계산
            const offsetHours = Math.round(cityInfo.lon / 15);
            let localHour = (sunInfo.utcHours + offsetHours + 24) % 24;
            
            const localH = String(Math.floor(localHour)).padStart(2, '0');
            const localM = String(now.getUTCMinutes()).padStart(2, '0');
            
            timeEl.textContent = `${localH}:${localM}`;
        }

        // 애니메이션 루프
        function animate() {
            draw();
            requestAnimationFrame(animate);
        }

        // 초기화
        function init() {
            // 캔버스 크기 조정 (반응형)
            function resize() {
                const containerWidth = Math.min(window.innerWidth * 0.95, 1200);
                const ratio = 600 / 1200;
                width = containerWidth;
                height = containerWidth * ratio;
                
                canvas.width = width;
                canvas.height = height;
            }
            
            window.addEventListener('resize', () => {
                resize();
                generateDots();
            });
            
            resize();
            generateDots();
            
            // 초기 그리기
            animate();
            
            // 10초마다 재생성 (더 자연스럽게)
            setInterval(() => {
                generateDots();
            }, 10000);
        }

        // URL 변경 감지 (브라우저 뒤로가기 등)
        window.addEventListener('popstate', () => {
            // 필요시 재그리기
        });

        // 시작
        window.onload = init;
    </script>
</body>
</html>
