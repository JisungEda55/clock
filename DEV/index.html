<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>NEMO Watch World Clock</title>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/topojson-client@3"></script>

<style>
html,body{
    margin:0;
    padding:0;
    background:#000;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
}
body{
    display:flex;
    justify-content:center;
    align-items:center;
}
.widget-container{
    position:relative;
    width:100%;
    height:100%;
    background:#000;
    overflow:hidden;
}
canvas{
    width:100%;
    height:100%;
    display:block;
}
.info-overlay{
    position:absolute;
    left:40px;
    bottom:30px;
    z-index:5;
    pointer-events:none;
    text-shadow:0 2px 12px rgba(0,0,0,.8);
}
.location-name{
    color:#00F918;
    font-weight:700;
    font-size:1.15rem;
    letter-spacing:.04em;
}
.local-time{
    font-size:5rem;
    line-height:1;
    font-weight:600;
    margin-top:4px;
}
.hide-ui{
    display:none !important;
}
</style>
</head>
<body>

<div class="widget-container">
    <canvas id="map"></canvas>

    <div class="info-overlay" id="overlay">
        <div class="location-name" id="loc-name">SEOUL</div>
        <div class="local-time" id="loc-time">--:--</div>
    </div>
</div>

<script>
/* ======================================================
   URL 사용법

   ?location=SUWON
   ?location=SUWON&DEV
   ?location=SUWON&notime
   ?location=SUWON&NEMO
   ?location=SUWON&DEV&NEMO&notime
====================================================== */

const canvas = document.getElementById("map");
const ctx = canvas.getContext("2d");

let width = innerWidth;
let height = innerHeight;

canvas.width = width;
canvas.height = height;

const params = new URLSearchParams(location.search);

const MODE_DEV    = params.has("DEV");
const MODE_NEMO   = params.has("NEMO");
const MODE_NOTIME = params.has("notime");

let targetCity = {
    name: params.get("location") || "SEOUL",
    lat: 37.5665,
    lon: 126.9780
};

let currentTimezone = "Asia/Seoul";

if(MODE_NOTIME){
    document.getElementById("overlay").classList.add("hide-ui");
}

document.getElementById("loc-name").textContent =
targetCity.name.toUpperCase();

let projection;
let geoPath;
let landDots = [];
let worldLand = null;

/* =========================
   시간 가속 DEV 모드
   24시간 = 5분
========================= */
const DEV_DAY_MS = 5 * 60 * 1000; // 5분
const REAL_DAY_MS = 24 * 60 * 60 * 1000;
const DEV_RATIO = REAL_DAY_MS / DEV_DAY_MS;

const devStartReal = Date.now();
const devStartSim = new Date();

function getNow(){
    if(!MODE_DEV) return new Date();

    const elapsed = Date.now() - devStartReal;
    const simElapsed = elapsed * DEV_RATIO;
    return new Date(devStartSim.getTime() + simElapsed);
}

/* =========================
   Projection 생성
========================= */
function buildProjection(){

    const scale = Math.min(width,height) * 0.28;

    projection = d3.geoEquirectangular()
        .translate([width/2,height/2])
        .scale(scale);

    if(MODE_NEMO){
        projection.center([targetCity.lon,targetCity.lat]);
    }

    geoPath = d3.geoPath().projection(projection).context(ctx);
}

/* =========================
   태양 위치 계산
========================= */
function getSunPosition(date){

    const start = Date.UTC(date.getUTCFullYear(),0,0);
    const now = date.getTime();
    const day = Math.floor((now-start)/86400000);

    const dec =
        -23.44 *
        Math.cos((360/365)*(day+10)*Math.PI/180);

    const utc =
        date.getUTCHours() +
        date.getUTCMinutes()/60 +
        date.getUTCSeconds()/3600;

    let lon = 180 - utc*15;

    while(lon>180) lon-=360;
    while(lon<-180) lon+=360;

    return {lat:dec,lon};
}

/* =========================
   점 데이터 생성
========================= */
function buildDots(){

    landDots = [];

    for(let lon=-180; lon<=180; lon+=2.5){
        for(let lat=-85; lat<=85; lat+=2.5){

            if(d3.geoContains(worldLand,[lon,lat])){

                const p = projection([lon,lat]);
                if(!p) continue;

                landDots.push({
                    lon,
                    lat,
                    latRad:lat*Math.PI/180,
                    x:p[0],
                    y:p[1]
                });
            }
        }
    }
}

/* =========================
   렌더링
========================= */
function draw(){

    const now = getNow();
    const sun = getSunPosition(now);

    ctx.clearRect(0,0,width,height);

    const dec = sun.lat * Math.PI/180;
    const sub = sun.lon * Math.PI/180;

    const sinDec = Math.sin(dec);
    const cosDec = Math.cos(dec);

    /* 점 지도 */
    for(const dot of landDots){

        const lonRad = dot.lon*Math.PI/180;
        const H = lonRad - sub;

        const altitude =
            Math.sin(dot.latRad)*sinDec +
            Math.cos(dot.latRad)*cosDec*Math.cos(H);

        ctx.fillStyle =
            altitude > 0 ? "#fff" : "#3a3a3c";

        ctx.beginPath();
        ctx.arc(dot.x,dot.y,1.25,0,Math.PI*2);
        ctx.fill();
    }

    /* 경계선 */
    const term = d3.geoCircle()
        .center([sun.lon,sun.lat])
        .radius(90)();

    ctx.beginPath();
    geoPath(term);
    ctx.strokeStyle="rgba(255,255,255,.35)";
    ctx.lineWidth=1.4;
    ctx.stroke();

    /* 도시 표시 */
    const city = projection([targetCity.lon,targetCity.lat]);

    if(city){
        ctx.beginPath();
        ctx.arc(city[0],city[1],5,0,Math.PI*2);
        ctx.fillStyle="#00F918";
        ctx.shadowColor="#00F918";
        ctx.shadowBlur=14;
        ctx.fill();
        ctx.shadowBlur=0;
    }

    requestAnimationFrame(draw);
}

/* =========================
   시계 표시
========================= */
function updateClock(){

    if(MODE_NOTIME) return;

    const now = getNow();

    try{
        const txt = new Intl.DateTimeFormat("en-GB",{
            timeZone:currentTimezone,
            hour:"2-digit",
            minute:"2-digit",
            hour12:false
        }).format(now);

        document.getElementById("loc-time").textContent = txt;

    }catch(e){

        const h = now.getHours().toString().padStart(2,"0");
        const m = now.getMinutes().toString().padStart(2,"0");
        document.getElementById("loc-time").textContent =
        `${h}:${m}`;
    }
}

setInterval(updateClock,250);

/* =========================
   위치 검색
========================= */
async function setupLocation(){

    const q = params.get("location");
    if(!q) return;

    try{
        const geo = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`
        ).then(r=>r.json());

        if(geo && geo.length){

            targetCity.lat = +geo[0].lat;
            targetCity.lon = +geo[0].lon;

            const tz = await fetch(
                `https://api.open-meteo.com/v1/forecast?latitude=${targetCity.lat}&longitude=${targetCity.lon}&current_weather=true&timezone=auto`
            ).then(r=>r.json());

            if(tz.timezone){
                currentTimezone = tz.timezone;
            }
        }

    }catch(err){
        console.log(err);
    }
}

/* =========================
   초기화
========================= */
async function init(){

    await setupLocation();

    buildProjection();

    const world = await d3.json(
        "https://unpkg.com/world-atlas@2.0.2/countries-110m.json"
    );

    worldLand =
        topojson.feature(world,world.objects.land);

    buildDots();
    updateClock();
    draw();
}

init();

/* =========================
   리사이즈
========================= */
addEventListener("resize",()=>{

    width = innerWidth;
    height = innerHeight;

    canvas.width = width;
    canvas.height = height;

    buildProjection();
    if(worldLand) buildDots();
});
</script>
</body>
</html>
